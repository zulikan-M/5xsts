<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>5× Sit-to-Stand (5XSTS) Timer</title>
  <meta name="description" content="Clinical timing tool for the Five Times Sit to Stand test. No patient data stored." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>" />

  <!-- React + Babel (for JSX) via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Prevent accidental pull-to-refresh / text selection while timing on touch devices */
    body { overscroll-behavior-y: contain; }
    button { -webkit-tap-highlight-color: transparent; user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect, useCallback } = React;

    // ---------- Helpers ----------
    const formatTime = (ms) => {
      const totalSeconds = ms / 1000;
      const secs = Math.floor(totalSeconds);
      const centis = Math.floor((ms % 1000) / 10);
      return `${String(secs).padStart(2, "0")}.${String(centis).padStart(2, "0")}`;
    };

    const riskLevel = (seconds) => {
      if (seconds > 15) return { label: "High fall risk", tone: "red" };
      if (seconds > 12) return { label: "Further assessment advised", tone: "amber" };
      return { label: "Within normal range", tone: "teal" };
    };

    const toneStyles = {
      teal: "bg-teal-50 text-teal-700 border-teal-200",
      amber: "bg-amber-50 text-amber-700 border-amber-200",
      red: "bg-red-50 text-red-700 border-red-200",
    };

    // ---------- Main App ----------
    function FiveTimesSitToStand() {
      // Stopwatch state
      const [elapsed, setElapsed] = useState(0); // ms
      const [running, setRunning] = useState(false);
      const startRef = useRef(0);
      const baseRef = useRef(0);
      const rafRef = useRef(null);

      // Session state (in-memory only — no PII, nothing persisted)
      const [results, setResults] = useState([]);
      const [showConfirm, setShowConfirm] = useState(false);
      const [justSaved, setJustSaved] = useState(false);

      const tick = useCallback(() => {
        setElapsed(baseRef.current + (Date.now() - startRef.current));
        rafRef.current = requestAnimationFrame(tick);
      }, []);

      useEffect(() => {
        return () => cancelAnimationFrame(rafRef.current);
      }, []);

      const handleStartPause = () => {
        if (running) {
          cancelAnimationFrame(rafRef.current);
          baseRef.current = baseRef.current + (Date.now() - startRef.current);
          setElapsed(baseRef.current);
          setRunning(false);
        } else {
          startRef.current = Date.now();
          rafRef.current = requestAnimationFrame(tick);
          setRunning(true);
          setJustSaved(false);
        }
      };

      const handleResetTimer = () => {
        cancelAnimationFrame(rafRef.current);
        baseRef.current = 0;
        setElapsed(0);
        setRunning(false);
        setJustSaved(false);
      };

      const handleSaveResult = () => {
        if (elapsed <= 0) return;
        const seconds = elapsed / 1000;
        const now = new Date();
        const timestamp = now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
        setResults((prev) => [
          ...prev,
          { id: Date.now(), seconds, timestamp, note: "" },
        ]);
        setJustSaved(true);
        cancelAnimationFrame(rafRef.current);
        baseRef.current = 0;
        setElapsed(0);
        setRunning(false);
      };

      const handleNoteChange = (id, note) => {
        setResults((prev) => prev.map((r) => (r.id === id ? { ...r, note } : r)));
      };

      const handleResetAll = () => {
        setResults([]);
        setShowConfirm(false);
      };

      const best =
        results.length > 0 ? Math.min(...results.map((r) => r.seconds)) : null;
      const bestRisk = best !== null ? riskLevel(best) : null;

      return (
        <div className="min-h-screen bg-slate-100 text-slate-800 font-sans">
          {/* Header */}
          <header className="bg-slate-800 text-white">
            <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
              <div>
                <h1 className="text-lg sm:text-xl font-semibold tracking-tight">
                  5× Sit-to-Stand <span className="text-teal-300 font-normal">(5XSTS)</span>
                </h1>
                <p className="text-xs text-slate-300 mt-0.5">
                  Clinical timing tool · Session data only · No patient identifiers stored
                </p>
              </div>
              <div className="hidden sm:flex items-center gap-2 text-xs bg-slate-700/60 rounded-full px-3 py-1.5">
                <span className="w-2 h-2 rounded-full bg-teal-400"></span>
                Local session — nothing saved
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-6 grid gap-6 lg:grid-cols-5">
            {/* ---------- Left: Stopwatch ---------- */}
            <section className="lg:col-span-3">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                {/* Instruction cue */}
                <div className="flex items-start gap-3 bg-sky-50 border border-sky-200 text-sky-900 rounded-xl px-4 py-3 mb-6">
                  <svg
                    className="w-5 h-5 mt-0.5 shrink-0 text-sky-600"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    strokeWidth="2"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                  <p className="text-sm leading-snug">
                    <strong>Count 5 repetitions.</strong> Stop the timer when the
                    patient's buttocks touch the chair on the 5th stand.
                  </p>
                </div>

                {/* Timer display */}
                <div
                  className={`rounded-2xl border-2 py-8 sm:py-10 text-center transition-colors ${
                    running
                      ? "border-teal-400 bg-teal-50"
                      : "border-slate-200 bg-slate-50"
                  }`}
                  role="timer"
                >
                  <div
                    className="font-mono font-bold text-slate-900 leading-none text-7xl sm:text-8xl"
                    style={{ fontVariantNumeric: "tabular-nums" }}
                  >
                    {formatTime(elapsed)}
                  </div>
                  <div className="mt-3 text-xs uppercase tracking-widest text-slate-500">
                    {running ? "Timing…" : elapsed > 0 ? "Paused" : "Ready"}
                  </div>
                </div>

                {/* Controls */}
                <div className="grid grid-cols-2 gap-3 mt-6">
                  <button
                    onClick={handleStartPause}
                    className={`col-span-2 rounded-xl py-5 text-xl font-semibold text-white shadow-sm active:scale-[0.99] transition focus:outline-none focus:ring-4 ${
                      running
                        ? "bg-amber-500 hover:bg-amber-600 focus:ring-amber-200"
                        : "bg-teal-600 hover:bg-teal-700 focus:ring-teal-200"
                    }`}
                  >
                    {running ? "Pause" : elapsed > 0 ? "Resume" : "Start"}
                  </button>

                  <button
                    onClick={handleSaveResult}
                    disabled={running || elapsed <= 0}
                    className="rounded-xl py-4 text-base font-semibold bg-slate-800 text-white shadow-sm hover:bg-slate-900 active:scale-[0.99] transition disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-4 focus:ring-slate-300"
                  >
                    Save result
                  </button>
                  <button
                    onClick={handleResetTimer}
                    disabled={elapsed <= 0 && !running}
                    className="rounded-xl py-4 text-base font-semibold bg-white border-2 border-slate-300 text-slate-700 hover:bg-slate-50 active:scale-[0.99] transition disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-4 focus:ring-slate-200"
                  >
                    Reset timer
                  </button>
                </div>

                {justSaved && (
                  <p className="mt-4 text-sm text-teal-700 bg-teal-50 border border-teal-200 rounded-lg px-3 py-2 text-center">
                    Result saved — timer reset for the next attempt.
                  </p>
                )}
              </div>

              {/* Reference guide */}
              <div className="mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                <h3 className="text-sm font-semibold text-slate-700 uppercase tracking-wide mb-3">
                  Reference — community-dwelling older adults
                </h3>
                <ul className="space-y-2 text-sm">
                  <li className="flex items-center gap-2">
                    <span className="w-2.5 h-2.5 rounded-full bg-teal-500 shrink-0"></span>
                    <span><strong>≤ 12 s</strong> — within typical range</span>
                  </li>
                  <li className="flex items-center gap-2">
                    <span className="w-2.5 h-2.5 rounded-full bg-amber-500 shrink-0"></span>
                    <span><strong>&gt; 12 s</strong> — consider further balance / mobility assessment</span>
                  </li>
                  <li className="flex items-center gap-2">
                    <span className="w-2.5 h-2.5 rounded-full bg-red-500 shrink-0"></span>
                    <span><strong>&gt; 15 s</strong> — associated with high fall risk</span>
                  </li>
                </ul>
                <p className="mt-3 text-xs text-slate-400">
                  Normative cut-offs vary by population and study. Interpret alongside the full clinical picture.
                </p>
              </div>
            </section>

            {/* ---------- Right: Summary + History ---------- */}
            <section className="lg:col-span-2 space-y-6">
              {/* Best performance card */}
              <div className="bg-gradient-to-br from-teal-600 to-teal-700 text-white rounded-2xl shadow-sm p-6">
                <h2 className="text-xs font-semibold uppercase tracking-widest text-teal-100">
                  Best performance
                </h2>
                {best !== null ? (
                  <React.Fragment>
                    <div className="mt-2 font-mono text-5xl font-bold leading-none" style={{ fontVariantNumeric: "tabular-nums" }}>
                      {best.toFixed(2)}
                      <span className="text-2xl font-medium text-teal-200 ml-1">s</span>
                    </div>
                    <div className="mt-3 inline-block text-xs font-medium bg-white/15 rounded-full px-3 py-1">
                      {bestRisk.label}
                    </div>
                  </React.Fragment>
                ) : (
                  <p className="mt-2 text-teal-100 text-sm">
                    No attempts recorded yet. Save a result to see the fastest time here.
                  </p>
                )}
              </div>

              {/* History log */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-sm font-semibold text-slate-700 uppercase tracking-wide">
                    Session results{" "}
                    <span className="text-slate-400 font-normal normal-case">
                      ({results.length})
                    </span>
                  </h2>
                  {results.length > 0 && (
                    <button
                      onClick={() => setShowConfirm(true)}
                      className="text-xs font-semibold text-red-600 hover:text-red-700 border border-red-200 hover:bg-red-50 rounded-lg px-3 py-1.5 transition focus:outline-none focus:ring-2 focus:ring-red-200"
                    >
                      Reset all results
                    </button>
                  )}
                </div>

                {results.length === 0 ? (
                  <p className="text-sm text-slate-400 text-center py-8">
                    Saved attempts will appear here.
                  </p>
                ) : (
                  <ul className="space-y-3">
                    {results.map((r, i) => {
                      const risk = riskLevel(r.seconds);
                      const isBest = r.seconds === best;
                      return (
                        <li
                          key={r.id}
                          className={`rounded-xl border p-3 ${
                            isBest
                              ? "border-teal-300 bg-teal-50/50"
                              : "border-slate-200 bg-slate-50/50"
                          }`}
                        >
                          <div className="flex items-baseline justify-between gap-2 flex-wrap">
                            <div className="flex items-baseline gap-2">
                              <span className="text-sm font-semibold text-slate-700">
                                Attempt {i + 1}:
                              </span>
                              <span className="font-mono text-lg font-bold text-slate-900" style={{ fontVariantNumeric: "tabular-nums" }}>
                                {r.seconds.toFixed(2)} s
                              </span>
                              {isBest && (
                                <span className="text-[10px] font-bold uppercase tracking-wide text-teal-700 bg-teal-100 rounded-full px-2 py-0.5">
                                  Best
                                </span>
                              )}
                            </div>
                            <span className="text-xs text-slate-400">{r.timestamp}</span>
                          </div>
                          <div
                            className={`mt-2 inline-block text-[11px] font-medium border rounded-full px-2 py-0.5 ${toneStyles[risk.tone]}`}
                          >
                            {risk.label}
                          </div>
                          <input
                            type="text"
                            value={r.note}
                            onChange={(e) => handleNoteChange(r.id, e.target.value)}
                            placeholder="Add note (e.g., used hands for balance)"
                            maxLength={120}
                            className="mt-2 w-full text-sm rounded-lg border border-slate-200 bg-white px-3 py-2 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-300 focus:border-teal-300"
                          />
                        </li>
                      );
                    })}
                  </ul>
                )}
              </div>
            </section>
          </main>

          <footer className="max-w-5xl mx-auto px-4 pb-8 text-center text-xs text-slate-400">
            All data lives in this session only and is cleared when the page closes. No patient names or identifiers are collected.
          </footer>

          {/* Confirm modal */}
          {showConfirm && (
            <div
              className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50"
              onClick={() => setShowConfirm(false)}
            >
              <div
                className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6"
                onClick={(e) => e.stopPropagation()}
                role="dialog"
                aria-modal="true"
                aria-label="Confirm reset of all results"
              >
                <h3 className="text-lg font-semibold text-slate-800">
                  Clear all results?
                </h3>
                <p className="mt-2 text-sm text-slate-500">
                  This removes all {results.length} saved attempt{results.length === 1 ? "" : "s"} and their notes. This can't be undone.
                </p>
                <div className="mt-5 grid grid-cols-2 gap-3">
                  <button
                    onClick={() => setShowConfirm(false)}
                    className="rounded-xl py-3 font-semibold bg-white border-2 border-slate-300 text-slate-700 hover:bg-slate-50 transition focus:outline-none focus:ring-4 focus:ring-slate-200"
                  >
                    Keep results
                  </button>
                  <button
                    onClick={handleResetAll}
                    className="rounded-xl py-3 font-semibold bg-red-600 text-white hover:bg-red-700 transition focus:outline-none focus:ring-4 focus:ring-red-200"
                  >
                    Clear all
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<FiveTimesSitToStand />);
  </script>
</body>
</html>
